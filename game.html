  <main class="app-main" id="app"></main>

  <script>
  (async function boot() {
    // Mount router
    window.SSDRouter.mount(document.getElementById('app'));

    // Load saved state
    const loaded = await window.SSDGame.state.load();
    if (!loaded || !loaded.createdAt) {
      location.hash = '#newgame';
    } else if (!location.hash) {
      location.hash = '#dashboard';
    }

    // Chrome money sync
    function syncChrome() {
      const s = window.SSDGame.state.current;
      document.getElementById('chrome-money').textContent = s ? `$${s.wallet.money.toLocaleString()}` : '$0';
    }
    syncChrome();
    window.SSDGame.state.onChange(syncChrome);

    // Chrome "New Game" button — wipes save + routes to new-game setup
    document.getElementById('chrome-new-game').onclick = async () => {
      if (!confirm('Start a new game? This WIPES your current save. Use Settings → Save Slots first if you want to keep a copy.')) return;
      await window.SSDStorage.wipeAll();
      for (const k of Object.keys(localStorage)) if (k.startsWith('ssd_') && k !== 'ssd_pollinations_key' && k !== 'ssd_ollama_endpoint' && k !== 'ssd_ollama_model' && k !== 'ssd_kokoro_voice') localStorage.removeItem(k);
      location.hash = '#newgame';
      location.reload();
    };

    // First route handle
    window.SSDRouter.handle();

    // Balancing tweak after load
    if (window.SSDGame.balancing) window.SSDGame.balancing.applyBalancing();

    // Start the tick engine
    window.SSDGame.tick.start();

    // === Voice (Kokoro TTS) ===
    // Voice toggle — persists in localStorage. Default: on.
    const VOICE_KEY = 'ssd_voice_on';
    function voiceOn() { return localStorage.getItem(VOICE_KEY) !== 'off'; }
    function setVoice(on) {
      localStorage.setItem(VOICE_KEY, on ? 'on' : 'off');
      const btn = document.getElementById('chrome-voice');
      btn.textContent = on ? '🔊' : '🔇';
      btn.title = on ? 'Voice ON — click to mute' : 'Voice OFF — click to enable';
      // Going OFF mid-response should stop whatever's playing immediately,
      // not let the queue finish + then stop.
      if (!on && window.SSDVoiceQueue) window.SSDVoiceQueue.cancel();
    }
    setVoice(voiceOn());
    document.getElementById('chrome-voice').onclick = () => setVoice(!voiceOn());
    window.SSDIsVoiceOn = voiceOn;   // global so room.js can check before speaking

    // Auto-check Ollama health on game boot — if the active model's weights
    // were nuked since landing (Storage Sense, manual cleanup, partial pull),
    // surface the repair overlay immediately instead of waiting for the first
    // chat call to fail with a cryptic error.  Non-blocking — fires alongside
    // Kokoro load.  Silent when everything is healthy.
    (async () => {
      try {
        if (window.SSDOllamaRepairOverlay) {
          // Small delay so the boot UI renders first
          await new Promise(r => setTimeout(r, 800));
          await window.SSDOllamaRepairOverlay.autoCheck();
        }
      } catch (err) {
        console.debug('[ollama-autocheck] failed silently:', err);
      }
    })();

    // Auto-load Kokoro in the background on game boot.  Model weights are cached
    // in browser IDB after the first landing-page load — re-instantiation here is
    // fast.  Non-blocking — game keeps loading.
    (async () => {
      const btn = document.getElementById('chrome-voice');
      if (!window.SSDKokoro) return;
      if (window.SSDKokoro.isReady()) return;
      if (!voiceOn()) return;
      btn.textContent = '⏳';
      btn.title = 'Loading Kokoro voice model…';
      try {
        await window.SSDKokoro.ensureLoaded((p) => {
          const pct = Math.round((p?.progress || 0) * 100);
          btn.title = `Loading voice ${pct}%…`;
        });
        setVoice(true);
        if (window.SSDNotify) window.SSDNotify.show('🔊 Kokoro voice ready', { type: 'success', durationMs: 2000 });
      } catch (err) {
        btn.textContent = '🔇';
        btn.title = 'Kokoro failed to load: ' + err.message;
        if (window.SSDNotify) window.SSDNotify.show('🔇 Voice unavailable: ' + err.message, { type: 'error' });
      }
    })();
  })();
  </script>
